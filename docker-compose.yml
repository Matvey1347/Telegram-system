services:
  postgres:
    image: postgres:16
    container_name: telegram_system_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: telegram_system
    ports:
      - "5432:5432"
    volumes:
      - telegram_system_postgres_data:/var/lib/postgresql/data

volumes:
  telegram_system_postgres_data:
